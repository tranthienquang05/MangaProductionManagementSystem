# 1. Cấu hình cổng chạy Server Backend
server.port=8080

# 2. Cấu hình kết nối tới MySQL Database (Thay 'manga_db' thành tên DB thực tế của bạn)
spring.datasource.url=jdbc:mysql://localhost:3306/manga_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Cấu hình Hibernate (Tự động cập nhật bảng dựa trên các Entity Java)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect